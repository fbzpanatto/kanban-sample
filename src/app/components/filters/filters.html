<div class="kanban-toolbar__filters">
  <div class="kanban-toolbar__search">
    <svg class="kanban-toolbar__search-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />
      <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
    </svg>
    <input
      type="text"
      class="kanban-toolbar__search-input"
      placeholder="Buscar aluno por nome..."
      [formControl]="searchControl()"
    />
  </div>

  <button class="kanban-toolbar__filter-btn" type="button">Data</button>
  <button class="kanban-toolbar__filter-btn" type="button">Campos</button>
  <button class="kanban-toolbar__filter-btn" type="button">Tags</button>
  <button class="kanban-toolbar__filter-btn" type="button">Status</button>
  <button class="kanban-toolbar__filter-btn" type="button">Mais filtros</button>
</div>
